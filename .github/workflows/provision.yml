name: Provision Infrastructure (IDP)

on:
  repository_dispatch:
    types: [provision]

env:
  AWS_REGION: us-east-1

jobs:

# =========================
# 1. INFRA STACK (S3, ECR, IAM)
# =========================
  infra:
    runs-on: ubuntu-latest

    outputs:
      ecr_repo: ${{ steps.out.outputs.ecr_repo }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (Infra)
        working-directory: ./terraform/infra
        run: terraform init -backend-config="key=infra/${{ github.event.client_payload.app_name }}/terraform.tfstate"

      - name: Import Existing Infra Resources
        working-directory: ./terraform/infra
        run: |
          BUCKET_NAME="${{ github.event.client_payload.bucket_name }}"
          ECR_REPO_NAME="${{ github.event.client_payload.app_name }}"

          # Import S3 bucket if it exists in AWS but not yet in state
          if aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            if terraform state list "module.infra.aws_s3_bucket.bucket" 2>/dev/null | grep -q .; then
              echo "S3 bucket '${BUCKET_NAME}' already in Terraform state — skipping import."
            else
              echo "Found existing S3 bucket '${BUCKET_NAME}' — importing."
              terraform import \
                -var="bucket_name=${BUCKET_NAME}" \
                -var="ecr_repo_name=${ECR_REPO_NAME}" \
                "module.infra.aws_s3_bucket.bucket" "$BUCKET_NAME"
            fi
          fi

          # Import ECR repository if it exists in AWS but not yet in state
          if aws ecr describe-repositories --repository-names "$ECR_REPO_NAME" \
              --region us-east-1 2>/dev/null; then
            if terraform state list "module.infra.aws_ecr_repository.repo" 2>/dev/null | grep -q .; then
              echo "ECR repository '${ECR_REPO_NAME}' already in Terraform state — skipping import."
            else
              echo "Found existing ECR repository '${ECR_REPO_NAME}' — importing."
              terraform import \
                -var="bucket_name=${BUCKET_NAME}" \
                -var="ecr_repo_name=${ECR_REPO_NAME}" \
                "module.infra.aws_ecr_repository.repo" "$ECR_REPO_NAME"
            fi
          fi

      - name: Terraform Apply (Infra)
        working-directory: ./terraform/infra
        run: |
          terraform apply -auto-approve \
            -var="bucket_name=${{ github.event.client_payload.bucket_name }}" \
            -var="ecr_repo_name=${{ github.event.client_payload.app_name }}"

      - name: Capture ECR Output
        id: out
        working-directory: ./terraform/infra
        run: |
          echo "ecr_repo=$(terraform output -raw ecr_repo_url)" >> $GITHUB_OUTPUT


# =========================
# 2. BUILD & PUSH IMAGE
# =========================
  build:
    needs: infra
    runs-on: ubuntu-latest

    outputs:
      image_uri: ${{ steps.img.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t lambda-app ./terraform/modules/lambda/app

      - name: Tag & Push Image
        id: img
        run: |
          IMAGE_URI=${{ needs.infra.outputs.ecr_repo }}:latest

          docker tag lambda-app:latest $IMAGE_URI
          docker push $IMAGE_URI

          # Use the immutable digest so Terraform always detects a change and
          # updates the Lambda function, even when the tag name stays the same.
          DIGEST=$(aws ecr describe-images \
            --repository-name "${{ github.event.client_payload.app_name }}" \
            --image-ids imageTag=latest \
            --region us-east-1 \
            --query 'imageDetails[0].imageDigest' \
            --output text)

          echo "image_uri=${{ needs.infra.outputs.ecr_repo }}@${DIGEST}" >> $GITHUB_OUTPUT


# =========================
# 3. LAMBDA STACK (DEPLOY)
# =========================
  deploy:
    needs: [infra, build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (Lambda)
        working-directory: ./terraform/lambda
        run: terraform init -backend-config="key=lambda/${{ github.event.client_payload.app_name }}/terraform.tfstate"

      - name: Import Existing API Gateway Resources
        working-directory: ./terraform/lambda
        run: |
          LAMBDA_NAME="${{ github.event.client_payload.lambda_name }}"
          BUCKET_NAME="${{ github.event.client_payload.bucket_name }}"
          IMAGE_URI="${{ needs.build.outputs.image_uri }}"
          API_NAME="${LAMBDA_NAME}-api"

          TF_VARS="-var=lambda_name=${LAMBDA_NAME} -var=bucket_name=${BUCKET_NAME} -var=image_uri=${IMAGE_URI}"

          # Look up existing API Gateway by name
          API_ID=$(aws apigatewayv2 get-apis --region us-east-1 \
            --query "Items[?Name=='${API_NAME}'].ApiId | [0]" \
            --output text 2>/dev/null || echo "")

          if [ -z "$API_ID" ] || [ "$API_ID" = "None" ]; then
            echo "No existing API Gateway '${API_NAME}' found — will be created fresh."
            exit 0
          fi
          echo "Found existing API Gateway '${API_NAME}': ${API_ID} — importing into state."

          if terraform state list "module.lambda.aws_apigatewayv2_api.this" 2>/dev/null | grep -q .; then
            echo "API Gateway already in Terraform state — skipping import."
            exit 0
          fi

          terraform import $TF_VARS "module.lambda.aws_apigatewayv2_api.this" "$API_ID"

          terraform import $TF_VARS "module.lambda.aws_apigatewayv2_stage.default" \
            "${API_ID}/\$default"

          INTEGRATION_ID=$(aws apigatewayv2 get-integrations \
            --api-id "$API_ID" --region us-east-1 \
            --query "Items[0].IntegrationId" --output text 2>/dev/null || echo "")
          if [ -n "$INTEGRATION_ID" ] && [ "$INTEGRATION_ID" != "None" ]; then
            terraform import $TF_VARS "module.lambda.aws_apigatewayv2_integration.lambda" \
              "${API_ID}/${INTEGRATION_ID}"
          fi

          ROUTE_ID=$(aws apigatewayv2 get-routes \
            --api-id "$API_ID" --region us-east-1 \
            --query "Items[0].RouteId" --output text 2>/dev/null || echo "")
          if [ -n "$ROUTE_ID" ] && [ "$ROUTE_ID" != "None" ]; then
            terraform import $TF_VARS "module.lambda.aws_apigatewayv2_route.post_events" \
              "${API_ID}/${ROUTE_ID}"
          fi

          terraform import $TF_VARS "module.lambda.aws_lambda_permission.apigw" \
            "${LAMBDA_NAME}/AllowAPIGatewayInvoke"

      - name: Import Existing Lambda and IAM Resources
        working-directory: ./terraform/lambda
        run: |
          LAMBDA_NAME="${{ github.event.client_payload.lambda_name }}"
          BUCKET_NAME="${{ github.event.client_payload.bucket_name }}"
          IMAGE_URI="${{ needs.build.outputs.image_uri }}"
          ROLE_NAME="${LAMBDA_NAME}-role"

          TF_VARS="-var=lambda_name=${LAMBDA_NAME} -var=bucket_name=${BUCKET_NAME} -var=image_uri=${IMAGE_URI}"

          # Import IAM role if it exists in AWS but not yet in state
          if aws iam get-role --role-name "$ROLE_NAME" 2>/dev/null; then
            if terraform state list "module.lambda.aws_iam_role.lambda_exec" 2>/dev/null | grep -q .; then
              echo "IAM role '${ROLE_NAME}' already in Terraform state — skipping import."
            else
              echo "Found existing IAM role '${ROLE_NAME}' — importing."
              terraform import $TF_VARS "module.lambda.aws_iam_role.lambda_exec" "$ROLE_NAME"
              terraform import $TF_VARS "module.lambda.aws_iam_role_policy_attachment.lambda_basic" \
                "${ROLE_NAME}/arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"
            fi
          fi

          # Import Lambda function if it exists in AWS but not yet in state
          if aws lambda get-function --function-name "$LAMBDA_NAME" \
              --region us-east-1 2>/dev/null; then
            if terraform state list "module.lambda.aws_lambda_function.this" 2>/dev/null | grep -q .; then
              echo "Lambda function '${LAMBDA_NAME}' already in Terraform state — skipping import."
            else
              echo "Found existing Lambda function '${LAMBDA_NAME}' — importing."
              terraform import $TF_VARS "module.lambda.aws_lambda_function.this" "$LAMBDA_NAME"
            fi
          fi

      - name: Terraform Apply (Lambda)
        working-directory: ./terraform/lambda
        run: |
          terraform apply -auto-approve \
            -var="lambda_name=${{ github.event.client_payload.lambda_name }}" \
            -var="bucket_name=${{ github.event.client_payload.bucket_name }}" \
            -var="image_uri=${{ needs.build.outputs.image_uri }}"

      - name: Print API Gateway URL
        working-directory: ./terraform/lambda
        run: |
          echo "API Gateway endpoint: $(terraform output -raw api_gateway_url)"

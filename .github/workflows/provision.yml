name: Provision Infrastructure

on:
  repository_dispatch:
    types: [provision]

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      ECR_REGISTRY: 648597472360.dkr.ecr.us-east-1.amazonaws.com
      ECR_REPO_NAME: lambda-app

    steps:

      - name: Show registry host only
        run: echo $ECR_REPO | cut -d'/' -f1

      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1


      - name: Build & Push Lambda Image
        run: |
          docker build -t lambda-app ./lambda/app
          docker tag lambda-app:latest $ECR_REGISTRY/$ECR_REPO_NAME:latest
          docker push $ECR_REGISTRY/$ECR_REPO_NAME:latest

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve \
          -var="bucket_name=${{ github.event.client_payload.bucket }}" \
          -var="lambda_name=${{ github.event.client_payload.lambda }}" \
          -var="image_uri=${{ env.ECR_REPO }}:latest"
